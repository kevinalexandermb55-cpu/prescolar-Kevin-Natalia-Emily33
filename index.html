<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- ✅ META PARA CELULARES -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Estrellitas Felices</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: linear-gradient(#7ec3ff, #eaf6ff); min-height: 100vh; }

       .header {
            text-align: center;
            background-color: #b3e5fc;
            padding: 0;
            overflow: hidden;
        }

        .header img {
            display: block;
            margin: 0 auto;
            width: 90%;
            max-width: 1000px;
            height: auto;
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        .navbar-container {
            background: linear-gradient(to bottom, #4a89c7, #265a8d);
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            width: 95%;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1000;
        }

        .navbar-nav {
            list-style: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-item {
            background: none;
            border: none;
            color: white;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 20px;
        }

        .nav-item i { color: #ffd700; font-size: 14px; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.2); }

        .section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin: 20px auto;
            width: 90%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            scroll-margin-top: 20px;
        }
        
        .hero { display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; }
        .hero img { width: 280px; border-radius: 20px; }
        .hero-text { max-width: 400px; }
        .hero-text button { background: #ffd166; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; margin-top: 15px; font-weight: bold; }

        .services { text-align: center; }
        .cards { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            width: 180px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border: 3px solid #ffd166;
            transition: transform 0.2s;
        }

        .momentos-img { 
            width: 70%; 
            max-width: 800px; 
            display: block; 
            margin: 20px auto; 
            border-radius: 20px;
        }

        .card:hover { transform: translateY(-5px); }
        .card img { width: 100px; height: 100px; margin-bottom: 20px; }

        .info-boxes { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
        .box { background: #f0f8ff; padding: 15px; border-radius: 15px; width: 150px; text-align: center; border: 1px dashed #5fa8d3; }

        .formulario input, .formulario textarea { width: 100%; max-width: 300px; margin: 8px auto; display: block; padding: 12px; border-radius: 10px; border: 1px solid #ccc; }
        .btn-enviar { background: #5fa8d3; color: white; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        footer { background: #5fa8d3; color: white; text-align: center; padding: 30px; margin-top: 40px; }

        .whatsapp-btn { 
            position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; 
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        img { max-width: 100%; height: auto; }

        /* ✅ RESPONSIVE SOLO CELULARES (AGREGADO) */
        @media (max-width: 768px) {

            .hero {
                flex-direction: column;
                text-align: center;
            }

            .hero img {
                width: 90%;
                margin-top: 15px;
            }

            .hero-text {
                max-width: 100%;
            }

            .navbar-container {
                border-radius: 20px;
                padding: 10px;
            }

            .nav-item {
                font-size: 12px;
                padding: 6px 10px;
            }

            .section {
                padding: 20px;
            }

            .card {
                width: 100%;
                max-width: 250px;
            }

            .box {
                width: 100%;
                max-width: 200px;
            }

            .momentos-img {
                width: 100%;
            }

        }

    </style>
</head>
